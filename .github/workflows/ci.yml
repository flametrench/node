name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    name: Node ${{ matrix.node }}

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: flametrench_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Enables PostgresTenancyStore integration tests. Unset → those
      # tests skip gracefully.
      TENANCY_POSTGRES_URL: postgresql://postgres:test@localhost:5432/flametrench_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # Build runs before test because downstream packages (e.g.
        # @flametrench/tenancy) resolve workspace deps via the built dist.
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test (with coverage)
        # workspace-concurrency=1 serialises packages so identity, tenancy,
        # and authz Postgres test suites don't race on the shared
        # `flametrench_test` database (each suite TRUNCATEs / DROPs the
        # public schema between tests). The `--` separator hands the
        # remaining flags to vitest; pnpm itself doesn't recognise
        # `--coverage`.
        run: pnpm -r --workspace-concurrency=1 test -- --coverage --coverage.reporter=text --coverage.reporter=json-summary

      - name: Upload coverage artifacts
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: packages/*/coverage/coverage-summary.json
          if-no-files-found: warn

  conformance-drift:
    name: Conformance fixtures match upstream spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this monorepo
        uses: actions/checkout@v6
        with:
          path: sdk

      - name: Checkout flametrench/spec
        uses: actions/checkout@v6
        with:
          repository: flametrench/spec
          ref: main
          path: spec

      - name: Verify vendored ID fixtures are byte-identical to upstream
        run: |
          set -euo pipefail
          SDK_FIXTURES=sdk/packages/ids/test/conformance/fixtures/ids
          SPEC_FIXTURES=spec/conformance/fixtures/ids
          if ! diff -r "$SDK_FIXTURES" "$SPEC_FIXTURES"; then
            echo "::error::Vendored ID fixtures have drifted from flametrench/spec."
            echo "To resolve: copy spec/conformance/fixtures/ids/*.json into packages/ids/test/conformance/fixtures/ids/ and commit."
            exit 1
          fi
          echo "✅ All vendored ID fixtures match upstream."

      - name: Verify vendored Postgres schemas are byte-identical to upstream
        run: |
          set -euo pipefail
          SPEC_SCHEMA=spec/reference/postgres.sql
          drift=0
          for pkg in identity tenancy authz; do
            SDK_SCHEMA="sdk/packages/$pkg/test/postgres-schema.sql"
            if ! diff -q "$SDK_SCHEMA" "$SPEC_SCHEMA" >/dev/null; then
              echo "::error file=$SDK_SCHEMA::Vendored Postgres schema for @flametrench/$pkg has drifted from flametrench/spec/reference/postgres.sql."
              diff "$SDK_SCHEMA" "$SPEC_SCHEMA" | head -20 || true
              drift=1
            fi
          done
          if [ "$drift" -ne 0 ]; then
            echo "To resolve: cp spec/reference/postgres.sql packages/<pkg>/test/postgres-schema.sql && commit (for each drifting package)."
            exit 1
          fi
          echo "✅ All vendored Postgres schemas (identity, tenancy, authz) match upstream."
