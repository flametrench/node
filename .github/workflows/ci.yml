name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']

    name: Node ${{ matrix.node }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # Build runs before test because downstream packages (e.g.
        # @flametrench/tenancy) resolve workspace deps via the built dist.
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

  conformance-drift:
    name: Conformance fixtures match upstream spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this monorepo
        uses: actions/checkout@v4
        with:
          path: sdk

      - name: Checkout flametrench/spec
        uses: actions/checkout@v4
        with:
          repository: flametrench/spec
          ref: main
          path: spec

      - name: Verify vendored fixtures are byte-identical to upstream
        run: |
          set -euo pipefail
          SDK_FIXTURES=sdk/packages/ids/test/conformance/fixtures/ids
          SPEC_FIXTURES=spec/conformance/fixtures/ids
          if ! diff -r "$SDK_FIXTURES" "$SPEC_FIXTURES"; then
            echo "::error::Vendored conformance fixtures have drifted from flametrench/spec."
            echo "To resolve: copy spec/conformance/fixtures/ids/*.json into packages/ids/test/conformance/fixtures/ids/ and commit."
            exit 1
          fi
          echo "✅ All vendored ID fixtures match upstream."
